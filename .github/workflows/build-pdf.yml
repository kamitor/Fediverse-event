name: Build Quarto PDF

on:
  push:
    tags:
      - "v*"          # trigger on version tags like v0.1, v1.0
    paths:
      - "tasks/coalition-concept/**.qmd"
      - "tasks/coalition-concept/**.yml"
      - "tasks/coalition-concept/**.bib"
      - "tasks/coalition-concept/_quarto.yml"
  workflow_dispatch:    # allow manual runs from the Actions tab

jobs:
  build-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true   # needed if quarto-thesis is a submodule

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "1.5.57"

      - name: Install TinyTeX (LaTeX for PDF rendering)
        run: |
          quarto install tinytex
          tlmgr install \
            tcolorbox pgf environ trimspaces \
            fontawesome5 academicons \
            || true   # continue even if some packages are already present

      - name: Install R dependencies (if _quarto.yml uses knitr engine)
        if: hashFiles('tasks/coalition-concept/renv.lock') != ''
        uses: r-lib/actions/setup-r@v2

      - name: Restore renv cache
        if: hashFiles('tasks/coalition-concept/renv.lock') != ''
        uses: r-lib/actions/setup-renv@v2
        with:
          working-directory: tasks/coalition-concept

      - name: Render Quarto document to PDF
        run: |
          cd tasks/coalition-concept
          quarto render --to pdf

      - name: Collect output PDF
        id: collect
        run: |
          PDF=$(find tasks/coalition-concept/_output -name "*.pdf" 2>/dev/null | head -1)
          # fall back to root of rendered dir
          [ -z "$PDF" ] && PDF=$(find tasks/coalition-concept -name "*.pdf" | head -1)
          echo "pdf_path=$PDF" >> "$GITHUB_OUTPUT"

      # ── On a version tag: create a GitHub Release and attach the PDF ──
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.collect.outputs.pdf_path }}
          name: "Coalition Concept ${{ github.ref_name }}"
          body: |
            Auto-generated PDF of the Coalition Concept brief.
            Built from commit ${{ github.sha }}.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── On every push (non-tag): upload the PDF as a workflow artifact ──
      - name: Upload PDF artifact
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: coalition-concept-pdf
          path: ${{ steps.collect.outputs.pdf_path }}
          retention-days: 30
